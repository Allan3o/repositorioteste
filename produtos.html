<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Minha Loja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="index.html">Minha Loja</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Início</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="produto.html">Produtos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contato.html">Contato</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row">

    <!-- Produto 1 -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Produto 1</h5>
        <p>Descrição breve do Produto 1.</p>

        <div class="form-check">
          <input class="form-check-input item-produto" type="checkbox" value="50.00">
          <label class="form-check-label">Selecionar (R$ 50,00)</label>
        </div>

        <div class="mt-2">
          <label>Quantidade</label>
          <input type="number" class="form-control qtd-produto" value="1" min="1">
        </div>
      </div>
    </div>

    <!-- Produto 2 -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Produto 2</h5>
        <p>Descrição breve do Produto 2.</p>

        <div class="form-check">
          <input class="form-check-input item-produto" type="checkbox" value="80.00">
          <label class="form-check-label">Selecionar (R$ 80,00)</label>
        </div>

        <div class="mt-2">
          <label>Quantidade</label>
          <input type="number" class="form-control qtd-produto" value="1" min="1">
        </div>
      </div>
    </div>

    <!-- Produto 3 -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Produto 3</h5>
        <p>Descrição breve do Produto 3.</p>

        <div class="form-check">
          <input class="form-check-input item-produto" type="checkbox" value="120.00">
          <label class="form-check-label">Selecionar (R$ 120,00)</label>
        </div>

        <div class="mt-2">
          <label>Quantidade</label>
          <input type="number" class="form-control qtd-produto" value="1" min="1">
        </div>
      </div>
    </div>

  </div>

  <!-- Total -->
  <div class="alert alert-info text-center mt-5">
    <h4>Valor Total: R$ <span id="valor-total">0,00</span></h4>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

<script>
  document.querySelectorAll('.item-produto, .qtd-produto')
    .forEach(elemento => {
      elemento.addEventListener('change', calcularTotal);
    });
</script>

</body>
</html>
